<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Controle — Basquete 3x3</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #FF5C00;
    --yellow: #FFD100;
    --dark: #0D0D0D;
    --dark2: #181818;
    --dark3: #242424;
    --dark4: #2E2E2E;
    --light: #F0EDE4;
    --gray: #888;
    --red: #E03030;
    --green: #2ECC71;
    --blue: #1A6FD4;
    --r: 10px;
  }

  html, body {
    background: var(--dark);
    color: var(--light);
    font-family: 'Barlow Condensed', sans-serif;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }

  body { padding-bottom: 80px; }

  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: var(--dark2);
    border-bottom: 2px solid var(--orange);
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
  }

  .topbar-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem; color: var(--orange); letter-spacing: 3px;
  }

  .conn-badge {
    font-size: 0.7rem; letter-spacing: 2px; padding: 4px 10px;
    border-radius: 20px; background: #2ECC7133; color: var(--green);
    border: 1px solid var(--green);
  }
  .conn-badge.offline { background: #E0303033; color: var(--red); border-color: var(--red); }

  .live-score-bar {
    background: var(--dark3);
    display: flex; align-items: center; justify-content: center;
    gap: 16px; padding: 12px 16px;
    border-bottom: 1px solid #2a2a2a;
  }

  .ls-team { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; }
  .ls-name { font-size: 0.75rem; letter-spacing: 2px; color: var(--gray); }
  .ls-score { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; color: var(--orange); line-height: 1; }

  .ls-timer { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 0 0 auto; }
  .ls-time { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--light); letter-spacing: 2px; }
  .ls-time.warning { color: #ff9900; }
  .ls-time.danger  { color: var(--red); }
  .ls-period { font-size: 0.7rem; letter-spacing: 2px; color: var(--gray); }

  .section { padding: 16px; margin-bottom: 4px; }
  .section-title {
    font-size: 0.7rem; letter-spacing: 4px; color: var(--gray);
    text-transform: uppercase; margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: #2a2a2a; }

  .timer-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .btn-timer-main {
    grid-column: 1 / -1;
    background: var(--orange); color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem; letter-spacing: 3px;
    border: none; border-radius: var(--r);
    padding: 18px; cursor: pointer;
    transition: transform 0.08s, background 0.15s;
    -webkit-user-select: none; user-select: none;
  }
  .btn-timer-main:active { transform: scale(0.96); }
  .btn-timer-main.running { background: #cc4900; }

  .btn-secondary {
    background: var(--dark3); color: var(--light);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem; letter-spacing: 2px;
    border: 1px solid #333; border-radius: var(--r);
    padding: 14px 10px; cursor: pointer;
    transition: transform 0.08s, background 0.1s;
    -webkit-user-select: none; user-select: none;
  }
  .btn-secondary:active { transform: scale(0.96); background: var(--dark4); }

  .quick-time { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }

  .btn-qtime {
    background: var(--dark3); color: var(--gray);
    font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 1px;
    border: 1px solid #333; border-radius: 8px;
    padding: 10px 14px; cursor: pointer;
    transition: transform 0.07s, background 0.1s;
    -webkit-user-select: none; user-select: none;
  }
  .btn-qtime:active { transform: scale(0.95); background: var(--dark4); color: var(--orange); }

  .score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .score-card {
    background: var(--dark2); border: 1px solid #2a2a2a;
    border-radius: var(--r); padding: 14px 12px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }

  .score-card-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 2px; color: var(--orange); }
  .score-display-ctrl { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; color: var(--light); line-height: 1; }
  .score-btns { display: flex; gap: 6px; width: 100%; }

  .btn-score {
    flex: 1; background: var(--dark3); color: var(--light);
    font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem;
    border: 1px solid #333; border-radius: 8px;
    padding: 12px 6px; cursor: pointer;
    transition: transform 0.07s, background 0.1s;
    -webkit-user-select: none; user-select: none;
  }
  .btn-score.add  { border-color: var(--orange); color: var(--orange); }
  .btn-score.add:active { background: #ff5c0022; transform: scale(0.95); }
  .btn-score.sub  { border-color: #444; color: #888; }
  .btn-score.sub:active { background: var(--dark4); transform: scale(0.95); }
  .btn-score.add2 { border-color: var(--yellow); color: var(--yellow); font-size: 1rem; }
  .btn-score.add2:active { background: #ffd10022; transform: scale(0.95); }

  .foul-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .foul-card {
    background: var(--dark2); border: 1px solid #2a2a2a;
    border-radius: var(--r); padding: 14px 12px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .foul-card-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 2px; color: var(--red); }
  .foul-display   { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--light); line-height: 1; }
  .foul-btns { display: flex; gap: 6px; width: 100%; }

  .btn-foul {
    flex: 1; background: var(--dark3);
    font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem;
    border: 1px solid #333; border-radius: 8px;
    padding: 14px 6px; cursor: pointer;
    transition: transform 0.07s, background 0.1s;
    -webkit-user-select: none; user-select: none;
  }
  .btn-foul.add { border-color: var(--red); color: var(--red); }
  .btn-foul.add:active { background: #e0303022; transform: scale(0.95); }
  .btn-foul.sub { color: #666; }
  .btn-foul.sub:active { transform: scale(0.95); background: var(--dark4); }

  .possession-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: center; }

  .btn-possession {
    background: var(--dark3); border: 2px solid #333;
    border-radius: var(--r); padding: 16px 10px;
    font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 2px;
    color: var(--gray); cursor: pointer; transition: all 0.15s;
    text-align: center; -webkit-user-select: none; user-select: none;
  }
  .btn-possession.active {
    background: #ffd10022; border-color: var(--yellow);
    color: var(--yellow);
    box-shadow: 0 0 16px rgba(255,209,0,0.2);
  }
  .btn-possession:active { transform: scale(0.97); }

  .possession-clear {
    background: none; border: 1px solid #333; color: #555;
    font-family: 'Bebas Neue', sans-serif; font-size: 0.8rem; letter-spacing: 2px;
    border-radius: 8px; padding: 10px 8px; cursor: pointer;
    -webkit-user-select: none; user-select: none;
  }
  .possession-clear:active { background: var(--dark3); }

  .config-form { display: flex; flex-direction: column; gap: 12px; }
  .config-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .config-row { display: flex; flex-direction: column; gap: 6px; }
  .config-label { font-size: 0.7rem; letter-spacing: 3px; color: var(--gray); text-transform: uppercase; }

  .config-input {
    background: var(--dark3); border: 1px solid #333; border-radius: 8px;
    color: var(--light); font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem; padding: 10px 12px; width: 100%;
    outline: none;
  }
  .config-input:focus { border-color: var(--orange); }

  .btn-apply {
    background: var(--dark3); border: 1px solid var(--orange); color: var(--orange);
    font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 3px;
    border-radius: var(--r); padding: 14px; cursor: pointer;
    transition: background 0.15s; -webkit-user-select: none; user-select: none;
  }
  .btn-apply:active { background: #ff5c0022; }

  .danger-row { display: flex; gap: 10px; }

  .btn-danger {
    flex: 1; background: #1a0000; border: 1px solid var(--red); color: var(--red);
    font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 3px;
    border-radius: var(--r); padding: 14px; cursor: pointer;
    transition: background 0.15s; -webkit-user-select: none; user-select: none;
  }
  .btn-danger:active { background: #e0303022; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--dark2); border: 1px solid var(--orange); color: var(--light);
    font-size: 0.9rem; letter-spacing: 1px; padding: 10px 24px;
    border-radius: 20px; transition: transform 0.25s; z-index: 100;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>

<div class="topbar">

<script>
// ── Supabase setup ────────────────────────────────────
const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_ANON)

// Estado local (espelho do banco)
let st = null
let timerInterval = null

// ── Estado inicial no banco ───────────────────────────
const DEFAULT_STATE = {
  id: MATCH_ID,
  team_a: 'TIME A', team_b: 'TIME B',
  score_a: 0, score_b: 0,
  fouls_a: 0, fouls_b: 0,
  time_left: 600, running: false,
  period: 1, possession: null,
  game_duration: 600,
  updated_at: new Date().toISOString(),
}

// ── Inicializa ────────────────────────────────────────
async function init() {
  // Tenta carregar estado existente
  const { data } = await db.from('match_state').select('*').eq('id', MATCH_ID).single()
  if (data) {
    st = data
    // Se estava rodando, mantém timer local
    if (st.running) startLocalTimer()
  } else {
    // Cria estado inicial
    await db.from('match_state').upsert(DEFAULT_STATE)
    st = { ...DEFAULT_STATE }
  }
  applyState(st)
  setConn(true)

  // Escuta mudanças em tempo real
  db.channel('match-ctrl')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'match_state' }, payload => {
      const newSt = payload.new
      // Se o running mudou externamente, sincroniza timer
      if (st && newSt.running !== st.running) {
        if (newSt.running) startLocalTimer()
        else stopLocalTimer()
      }
      st = newSt
      applyState(st)
    })
    .subscribe(status => setConn(status === 'SUBSCRIBED'))
}

// ── Timer local (roda no celular, salva no banco a cada seg) ──
function startLocalTimer() {
  stopLocalTimer()
  timerInterval = setInterval(async () => {
    if (!st || !st.running) { stopLocalTimer(); return }
    if (st.time_left <= 0) {
      stopLocalTimer()
      await patch({ running: false, time_left: 0 })
      playBuzzer()
      return
    }
    st.time_left--
    // Atualiza banco a cada 3s para não sobrecarregar (telão interpola localmente)
    if (st.time_left % 3 === 0 || st.time_left <= 5) {
      await patch({ time_left: st.time_left })
    }
    renderTimer(st.time_left, st.running)
  }, 1000)
}

function stopLocalTimer() {
  clearInterval(timerInterval)
  timerInterval = null
}

// ── Patch no banco ────────────────────────────────────
async function patch(fields) {
  const update = { ...fields, updated_at: new Date().toISOString() }
  await db.from('match_state').update(update).eq('id', MATCH_ID)
  if (st) st = { ...st, ...fields }
}

// ── Ações ─────────────────────────────────────────────
async function action(type, extra = {}) {
  if (!st) return
  switch (type) {
    case 'startStop':
      if (st.running) {
        stopLocalTimer()
        await patch({ running: false, time_left: st.time_left })
      } else {
        await patch({ running: true })
        startLocalTimer()
      }
      break
    case 'resetTimer':
      stopLocalTimer()
      await patch({ running: false, time_left: st.game_duration })
      break
    case 'setTime':
      stopLocalTimer()
      await patch({ running: false, time_left: extra.seconds })
      break
    case 'nextPeriod':
      stopLocalTimer()
      await patch({ running: false, time_left: st.game_duration, period: st.period + 1 })
      break
    case 'scoreA':
      await patch({ score_a: Math.max(0, st.score_a + (extra.delta || 1)) })
      break
    case 'scoreB':
      await patch({ score_b: Math.max(0, st.score_b + (extra.delta || 1)) })
      break
    case 'foulA':
      await patch({ fouls_a: Math.max(0, st.fouls_a + (extra.delta || 1)) })
      break
    case 'foulB':
      await patch({ fouls_b: Math.max(0, st.fouls_b + (extra.delta || 1)) })
      break
    case 'possession':
      await patch({ possession: extra.team })
      break
  }
}

function applyConfig() {
  const teamA = document.getElementById('inpTeamA').value.trim() || 'TIME A'
  const teamB = document.getElementById('inpTeamB').value.trim() || 'TIME B'
  const dur   = Math.max(1, Math.min(30, parseInt(document.getElementById('inpDuration').value) || 10)) * 60
  stopLocalTimer()
  patch({
    team_a: teamA, team_b: teamB, game_duration: dur,
    score_a: 0, score_b: 0, fouls_a: 0, fouls_b: 0,
    time_left: dur, running: false, period: 1, possession: null,
  })
  showToast('Configuração aplicada!')
}

function confirmReset() {
  if (confirm('Zerar placar, faltas e tempo?')) {
    stopLocalTimer()
    patch({
      score_a: 0, score_b: 0, fouls_a: 0, fouls_b: 0,
      time_left: st?.game_duration || 600, running: false,
      period: 1, possession: null,
    })
    showToast('Placar zerado')
  }
}

// ── Render ────────────────────────────────────────────
function applyState(s) {
  document.getElementById('lsNameA').textContent  = s.team_a
  document.getElementById('lsNameB').textContent  = s.team_b
  document.getElementById('lsScoreA').textContent = s.score_a
  document.getElementById('lsScoreB').textContent = s.score_b
  document.getElementById('lsPeriod').textContent = `PERÍODO ${s.period}`

  document.getElementById('ctrlNameA').textContent     = s.team_a
  document.getElementById('ctrlNameB').textContent     = s.team_b
  document.getElementById('ctrlFoulNameA').textContent = s.team_a
  document.getElementById('ctrlFoulNameB').textContent = s.team_b
  document.getElementById('posNameA').textContent      = s.team_a
  document.getElementById('posNameB').textContent      = s.team_b

  document.getElementById('ctrlScoreA').textContent = s.score_a
  document.getElementById('ctrlScoreB').textContent = s.score_b
  document.getElementById('ctrlFoulsA').textContent = s.fouls_a
  document.getElementById('ctrlFoulsB').textContent = s.fouls_b

  const btn = document.getElementById('btnStartStop')
  btn.textContent = s.running ? 'PAUSAR' : 'INICIAR'
  btn.classList.toggle('running', s.running)

  document.getElementById('btnPossA').classList.toggle('active', s.possession === 'A')
  document.getElementById('btnPossB').classList.toggle('active', s.possession === 'B')

  if (!document.getElementById('inpTeamA').value && s.team_a !== 'TIME A') document.getElementById('inpTeamA').value = s.team_a
  if (!document.getElementById('inpTeamB').value && s.team_b !== 'TIME B') document.getElementById('inpTeamB').value = s.team_b

  renderTimer(s.time_left, s.running)
}

function renderTimer(timeLeft, running) {
  const el = document.getElementById('lsTimer')
  el.textContent = formatTime(timeLeft)
  el.className   = 'ls-time' + (timeLeft <= 30 ? ' danger' : timeLeft <= 60 ? ' warning' : '')
}

function formatTime(s) {
  const m = Math.floor(s / 60)
  const sec = s % 60
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
}

function setConn(ok) {
  const el = document.getElementById('connBadge')
  el.textContent = ok ? 'ONLINE' : 'OFFLINE'
  el.classList.toggle('offline', !ok)
}

function showToast(msg) {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.classList.add('show')
  setTimeout(() => el.classList.remove('show'), 2000)
}

function playBuzzer() {
  try {
    const ctx  = new AudioContext()
    const osc  = ctx.createOscillator()
    const gain = ctx.createGain()
    osc.connect(gain); gain.connect(ctx.destination)
    osc.frequency.setValueAtTime(880, ctx.currentTime)
    osc.frequency.exponentialRampToValueAtTime(220, ctx.currentTime + 0.8)
    gain.gain.setValueAtTime(0.4, ctx.currentTime)
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8)
    osc.start(); osc.stop(ctx.currentTime + 0.8)
  } catch(e) {}
}

init()
</script>
