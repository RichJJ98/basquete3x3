<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Placar 3x3</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #FF5C00;
    --orange-dark: #CC4900;
    --yellow: #FFD100;
    --dark: #0A0A0A;
    --dark2: #141414;
    --dark3: #1E1E1E;
    --gray: #888;
    --light: #F0EDE4;
    --red: #E03030;
  }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--dark);
    color: var(--light);
    font-family: 'Barlow Condensed', sans-serif;
  }

  body {
    display: grid;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: 1fr;
    height: 100vh;
    gap: 0;
  }

  /* HEADER */
  header {
    display: flex; align-items: center; justify-content: center;
    background: var(--dark2);
    border-bottom: 3px solid var(--orange);
    padding: 10px 40px; gap: 20px;
  }

  .logo-3x3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem; color: var(--orange); letter-spacing: 4px;
  }

  .period-badge {
    background: var(--orange); color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem; padding: 4px 14px;
    letter-spacing: 2px; border-radius: 4px;
  }

  /* MAIN SCOREBOARD */
  .scoreboard {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: stretch;
    padding: 0; gap: 0; min-height: 0;
  }

  .team-panel {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 30px 40px; position: relative; gap: 16px;
  }

  .team-panel.team-a {
    background: linear-gradient(135deg, #0d0d0d 0%, #1a1a1a 100%);
    border-right: 2px solid var(--dark3);
  }

  .team-panel.team-b {
    background: linear-gradient(225deg, #0d0d0d 0%, #1a1a1a 100%);
    border-left: 2px solid var(--dark3);
  }

  .team-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 8vw, 7rem);
    letter-spacing: 4px; color: var(--light);
    text-align: center; line-height: 1;
    text-shadow: 0 0 40px rgba(255,92,0,0.15);
  }

  .team-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(8rem, 20vw, 18rem);
    line-height: 0.9; color: var(--orange);
    text-shadow: 0 0 60px rgba(255,92,0,0.4), 0 4px 0 var(--orange-dark);
    transition: transform 0.1s ease, color 0.1s ease;
  }

  .team-score.scored {
    transform: scale(1.08);
    color: var(--yellow);
  }

  .fouls-container {
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
  }

  .fouls-label {
    font-size: 0.9rem; letter-spacing: 3px;
    color: var(--gray); text-transform: uppercase;
  }

  .fouls-dots { display: flex; gap: 8px; }

  .foul-dot {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--dark3); border: 2px solid #333;
    transition: background 0.3s, border-color 0.3s;
  }

  .foul-dot.active {
    background: var(--red); border-color: #ff6060;
    box-shadow: 0 0 10px rgba(224,48,48,0.6);
  }

  .foul-count-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem; color: #555; letter-spacing: 2px;
  }

  .foul-count-number.warning { color: #ff9900; }
  .foul-count-number.danger  { color: var(--red); }

  .possession-indicator {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--yellow);
    box-shadow: 0 0 16px rgba(255,209,0,0.8);
    animation: pulse 1.5s ease-in-out infinite;
    display: none;
  }
  .possession-indicator.visible { display: block; }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.6; transform: scale(0.85); }
  }

  /* CENTER */
  .center-panel {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--dark2);
    padding: 20px 30px; min-width: 220px; gap: 16px;
    border-left: 1px solid #222; border-right: 1px solid #222;
  }

  .timer-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4rem, 10vw, 9rem);
    color: var(--light); letter-spacing: 4px;
    line-height: 1; text-align: center; transition: color 0.3s;
  }

  .timer-display.running { color: #eee; }
  .timer-display.warning { color: #ff9900; }
  .timer-display.danger  {
    color: var(--red);
    animation: blink 0.7s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.2; }
  }

  .timer-status {
    font-size: 0.75rem; letter-spacing: 4px;
    color: var(--gray); text-transform: uppercase;
  }
  .timer-status.running-text { color: #4CAF50; }

  .vs-divider {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem; color: #333; letter-spacing: 4px;
  }

  /* FOOTER */
  footer {
    background: var(--dark2); border-top: 2px solid #222;
    padding: 10px 40px;
    display: flex; align-items: center; justify-content: space-between; gap: 20px;
  }

  .footer-team {
    display: flex; align-items: center; gap: 12px;
    font-size: 0.8rem; letter-spacing: 2px; color: var(--gray);
  }

  .footer-score-diff {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem; color: var(--gray);
    text-align: center; letter-spacing: 2px;
  }
  .score-diff-positive { color: var(--orange); }

  .conn-dot {
    position: fixed; bottom: 12px; right: 16px;
    width: 8px; height: 8px; border-radius: 50%;
    background: #4CAF50; transition: background 0.3s;
  }
  .conn-dot.offline { background: var(--red); }

  .flash-overlay {
    position: fixed; inset: 0;
    background: rgba(255,209,0,0.15);
    pointer-events: none; opacity: 0;
    transition: opacity 0.05s; z-index: 100;
  }
  .flash-overlay.flash { opacity: 1; }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════
     ⚙️  CREDENCIAIS — mesmas do src/supabase.js
     ══════════════════════════════════════════════ -->

const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhudndnbHlsYmN3cmFhb3NhZmxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NzIyNzMsImV4cCI6MjA5MDA0ODI3M30.2jPRIgFUIhjeXduPpmEXGjHEZKhfNQoCX-dxUudup7I'
const MATCH_ID      = 'match_atual'
</script>
<!-- ══════════════════════════════════════════════ -->

<div class="flash-overlay" id="flashOverlay"></div>

<header>
  <span class="logo-3x3">BASQUETE 3×3</span>
  <span class="period-badge" id="periodBadge">PERÍODO 1</span>
</header>

<div class="scoreboard">
  <div class="team-panel team-a">
    <div class="possession-indicator" id="possessionA"></div>
    <div class="team-name" id="teamNameA">TIME A</div>
    <div class="team-score" id="scoreA">0</div>
    <div class="fouls-container">
      <div class="fouls-label">Faltas</div>
      <div class="fouls-dots" id="foulsDotsA"></div>
      <div class="foul-count-number" id="foulCountA">0</div>
    </div>
  </div>

  <div class="center-panel">
    <div class="timer-display" id="timerDisplay">10:00</div>
    <div class="timer-status" id="timerStatus">PARADO</div>
    <div class="vs-divider">VS</div>
  </div>

  <div class="team-panel team-b">
    <div class="possession-indicator" id="possessionB"></div>
    <div class="team-name" id="teamNameB">TIME B</div>
    <div class="team-score" id="scoreB">0</div>
    <div class="fouls-container">
      <div class="fouls-label">Faltas</div>
      <div class="fouls-dots" id="foulsDotsB"></div>
      <div class="foul-count-number" id="foulCountB">0</div>
    </div>
  </div>
</div>

<footer>
  <div class="footer-team" id="footerA">TIME A — 0 PTS</div>
  <div class="footer-score-diff" id="scoreDiff">—</div>
  <div class="footer-team" id="footerB">TIME B — 0 PTS</div>
</footer>

<div class="conn-dot offline" id="connDot"></div>

<script>
// ── Supabase setup ────────────────────────────────────
const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_ANON)

let st = null
let localTimer = null
let prevScoreA = 0, prevScoreB = 0

// ── Inicializa ────────────────────────────────────────
async function init() {
  const { data } = await db.from('match_state').select('*').eq('id', MATCH_ID).single()
  if (data) {
    st = data
    if (st.running) startLocalTimer(st.time_left)
    applyState(st)
  }

  // Realtime — escuta cada mudança do controle
  db.channel('match-telao')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'match_state' }, payload => {
      const newSt = payload.new
      const wasRunning = st?.running
      // Sincroniza timer com banco quando para ou muda
      if (!newSt.running) {
        stopLocalTimer()
        newSt.time_left = newSt.time_left // usa o valor do banco
      } else if (!wasRunning && newSt.running) {
        // Acabou de iniciar — começa a contar localmente
        startLocalTimer(newSt.time_left)
      }
      // Detecta ponto para animação
      if (st && newSt.score_a > st.score_a) { flashScore('scoreA'); flashScreen(); }
      if (st && newSt.score_b > st.score_b) { flashScore('scoreB'); flashScreen(); }
      st = newSt
      applyState(st)
    })
    .subscribe(status => {
      document.getElementById('connDot').classList.toggle('offline', status !== 'SUBSCRIBED')
    })
}

// ── Timer local (interpola entre atualizações do banco) ──
function startLocalTimer(startTime) {
  stopLocalTimer()
  if (st) st.time_left = startTime ?? st.time_left
  localTimer = setInterval(() => {
    if (!st) return
    if (st.time_left <= 0) { stopLocalTimer(); return }
    st.time_left--
    renderTimer(st.time_left, true)
  }, 1000)
}

function stopLocalTimer() {
  clearInterval(localTimer)
  localTimer = null
}

// ── Render ────────────────────────────────────────────
function applyState(s) {
  document.getElementById('teamNameA').textContent = s.team_a
  document.getElementById('teamNameB').textContent = s.team_b
  document.getElementById('periodBadge').textContent = `PERÍODO ${s.period}`

  document.getElementById('scoreA').textContent = s.score_a
  document.getElementById('scoreB').textContent = s.score_b

  makeDots(document.getElementById('foulsDotsA'), s.fouls_a)
  makeDots(document.getElementById('foulsDotsB'), s.fouls_b)

  const fcA = document.getElementById('foulCountA')
  fcA.textContent = s.fouls_a
  fcA.className   = 'foul-count-number' + (s.fouls_a >= 7 ? ' danger' : s.fouls_a >= 5 ? ' warning' : '')

  const fcB = document.getElementById('foulCountB')
  fcB.textContent = s.fouls_b
  fcB.className   = 'foul-count-number' + (s.fouls_b >= 7 ? ' danger' : s.fouls_b >= 5 ? ' warning' : '')

  document.getElementById('possessionA').classList.toggle('visible', s.possession === 'A')
  document.getElementById('possessionB').classList.toggle('visible', s.possession === 'B')

  document.getElementById('footerA').textContent = `${s.team_a} — ${s.score_a} PTS`
  document.getElementById('footerB').textContent = `${s.team_b} — ${s.score_b} PTS`

  const diff    = s.score_a - s.score_b
  const diffEl  = document.getElementById('scoreDiff')
  if (diff === 0) {
    diffEl.textContent = 'EMPATE'
    diffEl.className   = 'footer-score-diff'
  } else {
    const leading = diff > 0 ? s.team_a : s.team_b
    diffEl.textContent = `${leading} +${Math.abs(diff)}`
    diffEl.className   = 'footer-score-diff score-diff-positive'
  }

  if (!s.running) renderTimer(s.time_left, false)
}

function renderTimer(timeLeft, running) {
  const timer  = document.getElementById('timerDisplay')
  const status = document.getElementById('timerStatus')
  timer.textContent = formatTime(timeLeft)
  timer.className   = 'timer-display' + (timeLeft <= 30 ? ' danger' : timeLeft <= 60 ? ' warning' : running ? ' running' : '')
  status.textContent = running ? '● AO VIVO' : 'PARADO'
  status.className   = 'timer-status' + (running ? ' running-text' : '')
}

function makeDots(container, count, total = 7) {
  container.innerHTML = ''
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div')
    d.className = 'foul-dot' + (i < count ? ' active' : '')
    container.appendChild(d)
  }
}

function flashScore(id) {
  const el = document.getElementById(id)
  if (!el) return
  el.classList.remove('scored')
  void el.offsetWidth
  el.classList.add('scored')
  setTimeout(() => el.classList.remove('scored'), 400)
}

function flashScreen() {
  const el = document.getElementById('flashOverlay')
  el.classList.add('flash')
  setTimeout(() => el.classList.remove('flash'), 300)
}

function formatTime(s) {
  const m   = Math.floor(s / 60)
  const sec = s % 60
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
}

init()
</script>
</body>
</html>
